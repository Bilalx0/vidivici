version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vidivici_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vidivici_db
      POSTGRES_USER: vidivici_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - vidivici_network

  # Redis for Session Storage (Optional)
  redis:
    image: redis:7-alpine
    container_name: vidivici_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - vidivici_network

  # Your Next.js App (for production)
  app:
    build: .
    container_name: vidivici_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vidivici_user:${POSTGRES_PASSWORD}@postgres:5432/vidivici_db
      NEXTAUTH_URL: https://yourdomain.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    networks:
      - vidivici_network

volumes:
  postgres_data:
  redis_data:

networks:
  vidivici_network:
    driver: bridge